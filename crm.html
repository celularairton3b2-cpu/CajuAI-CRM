<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --accent: #e8ff47;
    --accent2: #47c5ff;
    --accent3: #ff6b6b;
    --accent4: #b47aff;
    --text: #f0f0f0;
    --muted: #6b7280;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    gap: 4px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-bottom: 28px;
    padding: 0 8px;
  }
  .logo span { color: var(--text); }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--muted);
    font-size: 0.88rem;
    font-weight: 500;
    transition: all .18s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: #000; }
  .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .sidebar-footer .badge {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 8px;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .page { display: none; flex-direction: column; gap: 24px; }
  .page.active { display: flex; }

  /* ── HEADER ROW ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
  }
  .page-subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.88rem;
    transition: all .18s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #d4eb30; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 11px; font-size: 0.8rem; }
  .btn-icon { padding: 7px; border-radius: 8px; }

  /* ── STAT CARDS ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color .18s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-sub { font-size: 0.78rem; color: var(--muted); }

  /* ── CARDS / TABLES ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 12px 20px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .14s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 13px 20px; font-size: 0.88rem; }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .badge-green { background: rgba(74,222,128,.15); color: var(--success); }
  .badge-blue { background: rgba(71,197,255,.15); color: var(--accent2); }
  .badge-yellow { background: rgba(251,191,36,.15); color: var(--warning); }
  .badge-red { background: rgba(248,113,113,.15); color: var(--danger); }
  .badge-purple { background: rgba(180,122,255,.15); color: var(--accent4); }
  .badge-gray { background: var(--surface2); color: var(--muted); }

  /* ── PIPELINE ── */
  .pipeline-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    align-items: start;
  }
  .pipeline-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .pipeline-col-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pipeline-col-title {
    font-size: 0.82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .pipeline-col-count {
    font-size: 0.75rem;
    background: var(--surface2);
    border-radius: 99px;
    padding: 2px 8px;
    color: var(--muted);
  }
  .pipeline-col-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 80px; }
  .deal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    cursor: pointer;
    transition: border-color .18s;
  }
  .deal-card:hover { border-color: var(--accent); }
  .deal-name { font-size: 0.88rem; font-weight: 500; margin-bottom: 4px; }
  .deal-company { font-size: 0.78rem; color: var(--muted); }
  .deal-value {
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    color: var(--accent);
    margin-top: 8px;
    font-weight: 600;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

  /* ── FORMS ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 80px; }

  /* ── SEARCH ── */
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    gap: 8px;
    transition: border-color .15s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    border: none;
    background: none;
    padding: 0;
    width: 220px;
  }
  .search-icon { color: var(--muted); font-size: 0.9rem; }

  /* ── TASKS ── */
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .14s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--surface2); }
  .task-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .task-check.done { background: var(--success); border-color: var(--success); }
  .task-check.done::after { content: '✓'; color: #000; font-size: 10px; }
  .task-text { flex: 1; font-size: 0.88rem; }
  .task-text.done { text-decoration: line-through; color: var(--muted); }
  .task-meta { font-size: 0.78rem; color: var(--muted); }
  .task-meta.overdue { color: var(--danger); }

  /* ── DASHBOARD MINI CHART ── */
  .mini-chart { display: flex; align-items: flex-end; gap: 6px; height: 60px; }
  .mini-bar {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px 4px 0 0;
    position: relative;
    transition: background .18s;
    cursor: default;
  }
  .mini-bar .fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    opacity: .85;
    transition: height .4s ease;
  }
  .mini-bar:hover .fill { opacity: 1; }

  /* ── AVATAR ── */
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 0.88rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 10px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── FUNNEL CHART ── */
  .funnel { display: flex; flex-direction: column; gap: 6px; padding: 16px 20px; }
  .funnel-row { display: flex; align-items: center; gap: 12px; }
  .funnel-label { font-size: 0.8rem; color: var(--muted); width: 90px; text-align: right; }
  .funnel-bar-wrap { flex: 1; height: 28px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .funnel-bar { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 0.78rem; font-weight: 600; transition: width .5s ease; }
  .funnel-count { font-size: 0.78rem; color: var(--muted); width: 30px; }

  /* ── TAGS ── */
  .tag-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 10px;
    color: var(--muted);
  }

  .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">nexo<span>CRM</span></div>
  <button class="nav-item active" onclick="navigate('dashboard')">
    <span class="icon">📊</span> Dashboard
  </button>
  <button class="nav-item" onclick="navigate('clientes')">
    <span class="icon">👥</span> Clientes
  </button>
  <button class="nav-item" onclick="navigate('pipeline')">
    <span class="icon">📈</span> Pipeline
  </button>
  <button class="nav-item" onclick="navigate('tarefas')">
    <span class="icon">✅</span> Tarefas
  </button>
  <div class="sidebar-footer">
    <div class="badge">Dados salvos localmente</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- ══ DASHBOARD ══ -->
  <section class="page active" id="page-dashboard">
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle" id="dash-date"></div>
      </div>
    </div>

    <div class="stat-grid" id="stat-grid"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- Funil -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Funil de Vendas</div>
        </div>
        <div class="funnel" id="funnel-chart"></div>
      </div>
      <!-- Tarefas recentes -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Próximas Tarefas</div>
          <button class="btn btn-ghost btn-sm" onclick="navigate('tarefas')">Ver todas →</button>
        </div>
        <div id="dash-tasks"></div>
      </div>
    </div>

    <!-- Clientes recentes -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Clientes Recentes</div>
        <button class="btn btn-ghost btn-sm" onclick="navigate('clientes')">Ver todos →</button>
      </div>
      <table>
        <thead><tr>
          <th>Nome</th><th>Empresa</th><th>Telefone</th><th>Status</th>
        </tr></thead>
        <tbody id="dash-clients-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- ══ CLIENTES ══ -->
  <section class="page" id="page-clientes">
    <div class="page-header">
      <div>
        <div class="page-title">Clientes</div>
        <div class="page-subtitle" id="client-count-label"></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar cliente..." oninput="filterClients(this.value)">
        </div>
        <button class="btn btn-primary" onclick="openClientModal()">+ Novo Cliente</button>
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th>Nome</th><th>Empresa</th><th>E-mail</th><th>Telefone</th><th>Status</th><th>Ações</th>
        </tr></thead>
        <tbody id="clients-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- ══ PIPELINE ══ -->
  <section class="page" id="page-pipeline">
    <div class="page-header">
      <div>
        <div class="page-title">Pipeline de Vendas</div>
        <div class="page-subtitle" id="pipeline-total-label"></div>
      </div>
      <button class="btn btn-primary" onclick="openDealModal()">+ Novo Negócio</button>
    </div>
    <div class="pipeline-grid" id="pipeline-grid"></div>
  </section>

  <!-- ══ TAREFAS ══ -->
  <section class="page" id="page-tarefas">
    <div class="page-header">
      <div>
        <div class="page-title">Tarefas & Follow-ups</div>
        <div class="page-subtitle" id="task-count-label"></div>
      </div>
      <div style="display:flex;gap:10px">
        <select onchange="filterTasks(this.value)" style="width:auto">
          <option value="all">Todas</option>
          <option value="pending">Pendentes</option>
          <option value="done">Concluídas</option>
        </select>
        <button class="btn btn-primary" onclick="openTaskModal()">+ Nova Tarefa</button>
      </div>
    </div>
    <div class="card">
      <div id="tasks-list"></div>
    </div>
  </section>

</main>

<!-- ══ MODAL CLIENTE ══ -->
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <div class="modal-title" id="client-modal-title">Novo Cliente</div>
    <div class="form-grid">
      <div class="form-group"><label>Nome *</label><input id="c-name" placeholder="João Silva"></div>
      <div class="form-group"><label>Empresa</label><input id="c-company" placeholder="Empresa Ltda"></div>
      <div class="form-group"><label>E-mail</label><input id="c-email" type="email" placeholder="joao@email.com"></div>
      <div class="form-group"><label>Telefone</label><input id="c-phone" placeholder="(86) 99999-9999"></div>
      <div class="form-group"><label>Status</label>
        <select id="c-status">
          <option value="lead">Lead</option>
          <option value="prospecto">Prospecto</option>
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
      <div class="form-group"><label>Cidade</label><input id="c-city" placeholder="Teresina"></div>
      <div class="form-group full"><label>Observações</label><textarea id="c-notes" placeholder="Informações adicionais..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-client')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()">Salvar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL NEGÓCIO ══ -->
<div class="modal-overlay" id="modal-deal">
  <div class="modal">
    <div class="modal-title" id="deal-modal-title">Novo Negócio</div>
    <div class="form-grid">
      <div class="form-group"><label>Nome do Negócio *</label><input id="d-name" placeholder="Projeto X"></div>
      <div class="form-group"><label>Cliente</label>
        <select id="d-client"></select>
      </div>
      <div class="form-group"><label>Valor (R$)</label><input id="d-value" type="number" placeholder="0"></div>
      <div class="form-group"><label>Etapa</label>
        <select id="d-stage">
          <option value="prospeccao">Prospecção</option>
          <option value="qualificacao">Qualificação</option>
          <option value="proposta">Proposta</option>
          <option value="fechamento">Fechamento</option>
        </select>
      </div>
      <div class="form-group full"><label>Notas</label><textarea id="d-notes" placeholder="Detalhes do negócio..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-deal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDeal()">Salvar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL TAREFA ══ -->
<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <div class="modal-title" id="task-modal-title">Nova Tarefa</div>
    <div class="form-grid">
      <div class="form-group full"><label>Título *</label><input id="t-title" placeholder="Ligar para cliente..."></div>
      <div class="form-group"><label>Cliente relacionado</label>
        <select id="t-client"><option value="">Nenhum</option></select>
      </div>
      <div class="form-group"><label>Tipo</label>
        <select id="t-type">
          <option value="ligacao">Ligação</option>
          <option value="email">E-mail</option>
          <option value="reuniao">Reunião</option>
          <option value="followup">Follow-up</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-group"><label>Prazo</label><input id="t-due" type="date"></div>
      <div class="form-group"><label>Prioridade</label>
        <select id="t-priority">
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>
      </div>
      <div class="form-group full"><label>Notas</label><textarea id="t-notes" placeholder="Detalhes da tarefa..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-task')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── DATA LAYER ──
const DB = {
  get clients() { try { return JSON.parse(localStorage.getItem('crm_clients') || '[]'); } catch { return []; } },
  set clients(v) { localStorage.setItem('crm_clients', JSON.stringify(v)); },
  get deals() { try { return JSON.parse(localStorage.getItem('crm_deals') || '[]'); } catch { return []; } },
  set deals(v) { localStorage.setItem('crm_deals', JSON.stringify(v)); },
  get tasks() { try { return JSON.parse(localStorage.getItem('crm_tasks') || '[]'); } catch { return []; } },
  set tasks(v) { localStorage.setItem('crm_tasks', JSON.stringify(v)); },
};

let editingClientId = null;
let editingDealId = null;
let editingTaskId = null;
let taskFilter = 'all';
let clientSearch = '';

// ── UTILS ──
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const fmt = (n) => n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtDate = (d) => d ? new Date(d + 'T00:00:00').toLocaleDateString('pt-BR') : '—';

const avatarColors = ['#e8ff47','#47c5ff','#b47aff','#ff6b6b','#4ade80','#fbbf24'];
function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function avatarColor(id) {
  const idx = id.charCodeAt(0) % avatarColors.length;
  return avatarColors[idx];
}

const statusMap = {
  lead: ['badge-purple','Lead'],
  prospecto: ['badge-blue','Prospecto'],
  ativo: ['badge-green','Ativo'],
  inativo: ['badge-gray','Inativo'],
};
const priorityMap = {
  baixa: ['badge-gray','Baixa'],
  media: ['badge-yellow','Média'],
  alta: ['badge-red','Alta'],
};
const typeIcon = { ligacao:'📞', email:'✉️', reuniao:'📅', followup:'🔁', outro:'📝' };
const stageMap = {
  prospeccao: { label: 'Prospecção', color: '#6b7280' },
  qualificacao: { label: 'Qualificação', color: '#47c5ff' },
  proposta: { label: 'Proposta', color: '#fbbf24' },
  fechamento: { label: 'Fechamento', color: '#4ade80' },
};

// ── NAVIGATION ──
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.getAttribute('onclick').includes(page)) n.classList.add('active');
  });
  if (page === 'dashboard') renderDashboard();
  if (page === 'clientes') renderClients();
  if (page === 'pipeline') renderPipeline();
  if (page === 'tarefas') renderTasks();
}

// ── DASHBOARD ──
function renderDashboard() {
  const clients = DB.clients;
  const deals = DB.deals;
  const tasks = DB.tasks;

  document.getElementById('dash-date').textContent =
    new Date().toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const totalValue = deals.reduce((s, d) => s + (Number(d.value) || 0), 0);
  const activeClients = clients.filter(c => c.status === 'ativo').length;
  const pendingTasks = tasks.filter(t => !t.done).length;
  const closingDeals = deals.filter(d => d.stage === 'fechamento').length;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Clientes</div><div class="stat-value" style="color:var(--accent2)">${clients.length}</div><div class="stat-sub">${activeClients} ativos</div></div>
    <div class="stat-card"><div class="stat-label">Negócios</div><div class="stat-value" style="color:var(--accent4)">${deals.length}</div><div class="stat-sub">${closingDeals} em fechamento</div></div>
    <div class="stat-card"><div class="stat-label">Valor Total</div><div class="stat-value" style="color:var(--accent);font-size:1.4rem">${fmt(totalValue)}</div><div class="stat-sub">em pipeline</div></div>
    <div class="stat-card"><div class="stat-label">Tarefas</div><div class="stat-value" style="color:var(--warning)">${pendingTasks}</div><div class="stat-sub">pendentes</div></div>
  `;

  // Funil
  const stages = ['prospeccao','qualificacao','proposta','fechamento'];
  const max = Math.max(1, ...stages.map(s => deals.filter(d => d.stage === s).length));
  document.getElementById('funnel-chart').innerHTML = stages.map(s => {
    const count = deals.filter(d => d.stage === s).length;
    const pct = Math.round((count / max) * 100);
    const val = deals.filter(d => d.stage === s).reduce((a, d) => a + (Number(d.value)||0), 0);
    return `<div class="funnel-row">
      <div class="funnel-label">${stageMap[s].label}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.max(pct,4)}%;background:${stageMap[s].color}20;color:${stageMap[s].color}">
        ${val > 0 ? fmt(val) : ''}
      </div></div>
      <div class="funnel-count">${count}</div>
    </div>`;
  }).join('');

  // Próximas tarefas
  const upcoming = tasks.filter(t => !t.done).slice(0, 5);
  document.getElementById('dash-tasks').innerHTML = upcoming.length
    ? upcoming.map(t => {
        const isOverdue = t.due && new Date(t.due) < new Date();
        return `<div class="task-item">
          <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')"></div>
          <div style="flex:1">
            <div class="task-text">${typeIcon[t.type]||'📝'} ${t.title}</div>
            <div class="task-meta ${isOverdue?'overdue':''}">${t.due ? fmtDate(t.due) : 'Sem prazo'}</div>
          </div>
        </div>`;
      }).join('')
    : '<div class="empty"><div class="empty-icon">✅</div>Nenhuma tarefa pendente!</div>';

  // Clientes recentes
  const recent = [...clients].reverse().slice(0, 5);
  document.getElementById('dash-clients-tbody').innerHTML = recent.length
    ? recent.map(c => {
        const [cls, lbl] = statusMap[c.status] || ['badge-gray','—'];
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:10px">
            <div class="avatar" style="background:${avatarColor(c.id)};color:#000">${initials(c.name)}</div>
            ${c.name}
          </div></td>
          <td>${c.company||'—'}</td>
          <td>${c.phone||'—'}</td>
          <td><span class="badge ${cls}">${lbl}</span></td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="4" class="empty">Nenhum cliente cadastrado</td></tr>`;
}

// ── CLIENTS ──
function renderClients(list) {
  const clients = list ?? DB.clients;
  document.getElementById('client-count-label').textContent = `${clients.length} cliente(s) cadastrado(s)`;
  const tbody = document.getElementById('clients-tbody');
  if (!clients.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">👥</div>Nenhum cliente. Adicione o primeiro!</div></td></tr>`;
    return;
  }
  tbody.innerHTML = clients.map(c => {
    const [cls, lbl] = statusMap[c.status] || ['badge-gray','—'];
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="avatar" style="background:${avatarColor(c.id)};color:#000">${initials(c.name)}</div>
        <div><div>${c.name}</div>${c.city?`<div style="font-size:.75rem;color:var(--muted)">${c.city}</div>`:''}</div>
      </div></td>
      <td>${c.company||'—'}</td>
      <td>${c.email||'—'}</td>
      <td>${c.phone||'—'}</td>
      <td><span class="badge ${cls}">${lbl}</span></td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editClient('${c.id}')" title="Editar">✏️</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteClient('${c.id}')" title="Excluir">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
}

function filterClients(q) {
  clientSearch = q.toLowerCase();
  const filtered = DB.clients.filter(c =>
    c.name.toLowerCase().includes(clientSearch) ||
    (c.company||'').toLowerCase().includes(clientSearch) ||
    (c.email||'').toLowerCase().includes(clientSearch)
  );
  renderClients(filtered);
}

function openClientModal(id) {
  editingClientId = id || null;
  const c = id ? DB.clients.find(x => x.id === id) : null;
  document.getElementById('client-modal-title').textContent = c ? 'Editar Cliente' : 'Novo Cliente';
  document.getElementById('c-name').value = c?.name || '';
  document.getElementById('c-company').value = c?.company || '';
  document.getElementById('c-email').value = c?.email || '';
  document.getElementById('c-phone').value = c?.phone || '';
  document.getElementById('c-status').value = c?.status || 'lead';
  document.getElementById('c-city').value = c?.city || '';
  document.getElementById('c-notes').value = c?.notes || '';
  document.getElementById('modal-client').classList.add('open');
}

function saveClient() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { alert('Nome é obrigatório'); return; }
  const clients = DB.clients;
  const data = {
    name,
    company: document.getElementById('c-company').value,
    email: document.getElementById('c-email').value,
    phone: document.getElementById('c-phone').value,
    status: document.getElementById('c-status').value,
    city: document.getElementById('c-city').value,
    notes: document.getElementById('c-notes').value,
    createdAt: new Date().toISOString(),
  };
  if (editingClientId) {
    const idx = clients.findIndex(c => c.id === editingClientId);
    clients[idx] = { ...clients[idx], ...data };
  } else {
    clients.push({ id: uid(), ...data });
  }
  DB.clients = clients;
  closeModal('modal-client');
  renderClients();
}

function editClient(id) { openClientModal(id); }

function deleteClient(id) {
  if (!confirm('Excluir este cliente?')) return;
  DB.clients = DB.clients.filter(c => c.id !== id);
  renderClients();
}

// ── PIPELINE ──
function renderPipeline() {
  const deals = DB.deals;
  const total = deals.reduce((s, d) => s + (Number(d.value)||0), 0);
  document.getElementById('pipeline-total-label').textContent = `${deals.length} negócio(s) · Total: ${fmt(total)}`;

  const stages = ['prospeccao','qualificacao','proposta','fechamento'];
  document.getElementById('pipeline-grid').innerHTML = stages.map(stage => {
    const stageDe = deals.filter(d => d.stage === stage);
    const stageVal = stageDe.reduce((s, d) => s + (Number(d.value)||0), 0);
    const cards = stageDe.map(d => {
      const client = DB.clients.find(c => c.id === d.clientId);
      return `<div class="deal-card" onclick="editDeal('${d.id}')">
        <div class="deal-name">${d.name}</div>
        <div class="deal-company">${client?.name || '—'}</div>
        ${d.value ? `<div class="deal-value">${fmt(Number(d.value))}</div>` : ''}
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-danger btn-sm btn-icon" onclick="event.stopPropagation();deleteDeal('${d.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('');

    return `<div class="pipeline-col">
      <div class="pipeline-col-header">
        <div class="pipeline-col-title" style="color:${stageMap[stage].color}">${stageMap[stage].label}</div>
        <div class="pipeline-col-count">${stageDe.length}</div>
      </div>
      <div class="pipeline-col-body">
        ${cards || `<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:16px">Sem negócios</div>`}
        ${stageVal > 0 ? `<div style="font-size:.75rem;color:var(--muted);text-align:center;padding-top:4px">${fmt(stageVal)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openDealModal(id) {
  editingDealId = id || null;
  const d = id ? DB.deals.find(x => x.id === id) : null;
  document.getElementById('deal-modal-title').textContent = d ? 'Editar Negócio' : 'Novo Negócio';
  document.getElementById('d-name').value = d?.name || '';
  document.getElementById('d-value').value = d?.value || '';
  document.getElementById('d-stage').value = d?.stage || 'prospeccao';
  document.getElementById('d-notes').value = d?.notes || '';

  const sel = document.getElementById('d-client');
  sel.innerHTML = '<option value="">Nenhum</option>' + DB.clients.map(c =>
    `<option value="${c.id}" ${d?.clientId === c.id ? 'selected' : ''}>${c.name}</option>`
  ).join('');

  document.getElementById('modal-deal').classList.add('open');
}

function saveDeal() {
  const name = document.getElementById('d-name').value.trim();
  if (!name) { alert('Nome é obrigatório'); return; }
  const deals = DB.deals;
  const data = {
    name,
    clientId: document.getElementById('d-client').value,
    value: document.getElementById('d-value').value,
    stage: document.getElementById('d-stage').value,
    notes: document.getElementById('d-notes').value,
  };
  if (editingDealId) {
    const idx = deals.findIndex(d => d.id === editingDealId);
    deals[idx] = { ...deals[idx], ...data };
  } else {
    deals.push({ id: uid(), createdAt: new Date().toISOString(), ...data });
  }
  DB.deals = deals;
  closeModal('modal-deal');
  renderPipeline();
}

function editDeal(id) { openDealModal(id); }
function deleteDeal(id) {
  if (!confirm('Excluir este negócio?')) return;
  DB.deals = DB.deals.filter(d => d.id !== id);
  renderPipeline();
}

// ── TASKS ──
function renderTasks(filter) {
  if (filter) taskFilter = filter;
  let tasks = DB.tasks;
  if (taskFilter === 'pending') tasks = tasks.filter(t => !t.done);
  if (taskFilter === 'done') tasks = tasks.filter(t => t.done);
  const total = DB.tasks.length;
  const pending = DB.tasks.filter(t => !t.done).length;
  document.getElementById('task-count-label').textContent = `${pending} pendente(s) de ${total}`;
  const list = document.getElementById('tasks-list');
  if (!tasks.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>Nenhuma tarefa aqui.</div>`;
    return;
  }
  list.innerHTML = tasks.map(t => {
    const isOverdue = !t.done && t.due && new Date(t.due) < new Date();
    const client = DB.clients.find(c => c.id === t.clientId);
    const [pcls, plbl] = priorityMap[t.priority] || ['badge-gray','—'];
    return `<div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')"></div>
      <div style="flex:1">
        <div class="task-text ${t.done?'done':''}">${typeIcon[t.type]||'📝'} ${t.title}</div>
        <div style="display:flex;gap:8px;margin-top:4px;align-items:center;flex-wrap:wrap">
          ${client ? `<span class="tag">${client.name}</span>` : ''}
          <span class="task-meta ${isOverdue?'overdue':''}">${t.due ? fmtDate(t.due) : 'Sem prazo'}</span>
          <span class="badge ${pcls}" style="font-size:.7rem">${plbl}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editTask('${t.id}')">✏️</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteTask('${t.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function filterTasks(val) { renderTasks(val); }

function toggleTask(id) {
  const tasks = DB.tasks;
  const t = tasks.find(x => x.id === id);
  if (t) t.done = !t.done;
  DB.tasks = tasks;
  renderTasks();
  renderDashboard();
}

function openTaskModal(id) {
  editingTaskId = id || null;
  const t = id ? DB.tasks.find(x => x.id === id) : null;
  document.getElementById('task-modal-title').textContent = t ? 'Editar Tarefa' : 'Nova Tarefa';
  document.getElementById('t-title').value = t?.title || '';
  document.getElementById('t-type').value = t?.type || 'ligacao';
  document.getElementById('t-due').value = t?.due || '';
  document.getElementById('t-priority').value = t?.priority || 'media';
  document.getElementById('t-notes').value = t?.notes || '';

  const sel = document.getElementById('t-client');
  sel.innerHTML = '<option value="">Nenhum</option>' + DB.clients.map(c =>
    `<option value="${c.id}" ${t?.clientId === c.id ? 'selected' : ''}>${c.name}</option>`
  ).join('');

  document.getElementById('modal-task').classList.add('open');
}

function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { alert('Título é obrigatório'); return; }
  const tasks = DB.tasks;
  const data = {
    title,
    clientId: document.getElementById('t-client').value,
    type: document.getElementById('t-type').value,
    due: document.getElementById('t-due').value,
    priority: document.getElementById('t-priority').value,
    notes: document.getElementById('t-notes').value,
    done: false,
  };
  if (editingTaskId) {
    const idx = tasks.findIndex(t => t.id === editingTaskId);
    tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.push({ id: uid(), createdAt: new Date().toISOString(), ...data });
  }
  DB.tasks = tasks;
  closeModal('modal-task');
  renderTasks();
}

function editTask(id) { openTaskModal(id); }
function deleteTask(id) {
  if (!confirm('Excluir esta tarefa?')) return;
  DB.tasks = DB.tasks.filter(t => t.id !== id);
  renderTasks();
}

// ── MODAL ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

seedIfEmpty();
renderDashboard();
</script>
